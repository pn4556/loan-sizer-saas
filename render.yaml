# Loan Sizer SaaS - Render Deployment Configuration
# This file tells Render how to deploy your application

services:
  # Backend API Service - MINIMAL VERSION (reliable)
  - type: web
    name: loan-sizer-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements-minimal.txt
    startCommand: cd backend && uvicorn minimal_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
    healthCheckPath: /health

  # Frontend Static Site
  - type: web
    name: loan-sizer-dashboard
    runtime: static
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: ./frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        value: https://loan-sizer-api.onrender.com
