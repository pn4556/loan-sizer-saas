name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Verify frontend content
        run: |
          echo "Frontend directory contents:"
          ls -la frontend/
          echo ""
          echo "index.html size:"
          wc -c frontend/index.html
          echo ""
          echo "Version check:"
          grep -o 'version.*content.*2\.0\.[0-9]' frontend/index.html || echo "No version meta tag found"
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Copy CNAME to frontend
        run: cp CNAME frontend/CNAME
      
      - name: Add cache buster
        run: |
          # Add timestamp to force cache invalidation
          echo "<!-- Build: $(date -u +%Y%m%d%H%M%S) -->" >> frontend/index.html
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
