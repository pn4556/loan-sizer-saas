services:
  - type: web
    name: loan-sizer-parser
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn pdf_api:app --host 0.0.0.0 --port $PORT
    plan: basic  # Updated from deprecated 'starter'
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
